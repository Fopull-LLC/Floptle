# Faster linking during iteration. These are opt-in hints; if a linker isn't
# installed, comment the matching block out. (mold on Linux, lld elsewhere.)

# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[env]
# Surface clearer wgpu validation messages while developing.
WGPU_VALIDATION = "1"
